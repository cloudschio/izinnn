<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Form Izin Online</title>
  <style>
    :root{
      --bg:#f8fafc;
      --card:#ffffff;
      --muted:#475569;
      --text:#0f172a;
      --primary:#2563eb;
      --primary2:#1d4ed8;
      --accent:#f97316;
      --accent2:#ea580c;
      --line:#cbd5e1;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:
        radial-gradient(circle at top left, rgba(37,99,235,.12), transparent 35%),
        radial-gradient(circle at bottom right, rgba(249,115,22,.12), transparent 35%),
        linear-gradient(180deg,#eff6ff 0%, #ffffff 100%);
      color:var(--text);
      min-height:100vh;
      padding:24px;
    }
    .wrap{max-width:820px;margin:0 auto}
    .card{
      background:rgba(255,255,255,.96);
      border:1px solid rgba(37,99,235,.12);
      border-radius:22px;
      padding:30px;
      box-shadow:0 18px 45px rgba(15,23,42,.10);
      backdrop-filter:blur(10px);
    }
    .badge{
      display:inline-block;
      padding:6px 12px;
      border-radius:999px;
      background:linear-gradient(135deg, rgba(37,99,235,.12), rgba(249,115,22,.14));
      color:#1d4ed8;
      font-size:12px;
      margin-bottom:14px;
      border:1px solid rgba(37,99,235,.15);
      font-weight:700;
      letter-spacing:.2px;
    }
    h1{
      margin:0 0 8px;
      font-size:30px;
      color:#0f172a;
      line-height:1.2;
    }
    p{
      margin:0 0 24px;
      color:var(--muted);
      line-height:1.6;
    }
    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:16px;
    }
    .full{grid-column:1 / -1}
    label{
      display:block;
      margin:0 0 8px;
      font-size:14px;
      color:#334155;
      font-weight:600;
    }
    input, select, textarea{
      width:100%;
      border:1px solid var(--line);
      background:#fff;
      color:var(--text);
      border-radius:12px;
      padding:12px 14px;
      outline:none;
      font-size:15px;
      transition:.2s ease;
    }
    input:focus, select:focus, textarea:focus{
      border-color:var(--primary);
      box-shadow:0 0 0 4px rgba(37,99,235,.12);
    }
    textarea{
      min-height:120px;
      resize:vertical;
    }
    .radio-row{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      padding:4px 0 0;
    }
    .radio-item{
      display:flex;
      align-items:center;
      gap:8px;
      background:#eff6ff;
      border:1px solid #bfdbfe;
      border-radius:12px;
      padding:10px 12px;
    }
    .radio-item input{width:auto}
    .actions{
      display:flex;
      gap:12px;
      margin-top:22px;
      flex-wrap:wrap;
    }
    button{
      border:0;
      border-radius:12px;
      padding:12px 18px;
      font-weight:700;
      cursor:pointer;
      color:white;
      background:linear-gradient(135deg,var(--primary),var(--primary2));
      transition:.2s ease;
    }
    button:hover{transform:translateY(-1px)}
    .secondary{
      background:#fff;
      color:#1d4ed8;
      border:1px solid #bfdbfe;
    }
    .secondary:hover{background:#eff6ff}
    .note{
      font-size:13px;
      color:var(--muted);
      margin-top:14px;
    }
    .hero{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      margin-bottom:20px;
      padding:18px;
      border-radius:18px;
      background:linear-gradient(135deg, rgba(37,99,235,.06), rgba(249,115,22,.07));
      border:1px solid rgba(37,99,235,.08);
    }
    .hero-left{flex:1}
    .hero-right{
      min-width:140px;
      text-align:right;
      color:#0f172a;
      font-weight:700;
      font-size:14px;
    }
    .hero-right span{
      display:block;
      color:#f97316;
      font-size:13px;
      font-weight:700;
      margin-top:4px;
    }
    @media (max-width:640px){
      .grid{grid-template-columns:1fr}
      .card{padding:20px}
      h1{font-size:24px}
      .hero{flex-direction:column; align-items:flex-start}
      .hero-right{text-align:left}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="badge">FORM IZIN ONLINE</div>

      <div class="hero">
        <div class="hero-left">
          <h1>Pengajuan Izin Karyawan / Siswa</h1>
          <p>Silakan isi formulir berikut dengan lengkap. Data akan dikirim ke email admin melalui Formspree.</p>
        </div>
        <div class="hero-right">
          Responsive
          <span>Biru + Oranye</span>
        </div>
      </div>

      <form action="https://formspree.io/f/YOUR_FORMSPREE_ID" method="POST">
        <div class="grid">
          <div>
            <label for="nama">Nama Lengkap</label>
            <input type="text" id="nama" name="nama" required />
          </div>
          <div>
            <label for="nik">NIK / NIS / ID</label>
            <input type="text" id="nik" name="nik" required />
          </div>

          <div>
            <label for="divisi">Divisi / Kelas</label>
            <input type="text" id="divisi" name="divisi" required />
          </div>
          <div>
            <label for="tanggal">Tanggal Izin</label>
            <input type="date" id="tanggal" name="tanggal" required />
          </div>

          <div class="full">
            <label>Jenis Izin</label>
            <div class="radio-row">
              <label class="radio-item"><input type="radio" name="jenis_izin" value="Sakit" required /> Sakit</label>
              <label class="radio-item"><input type="radio" name="jenis_izin" value="Keperluan Pribadi" /> Keperluan Pribadi</label>
              <label class="radio-item"><input type="radio" name="jenis_izin" value="Cuti" /> Cuti</label>
              <label class="radio-item"><input type="radio" name="jenis_izin" value="Lainnya" /> Lainnya</label>
            </div>
          </div>

          <div class="full">
            <label for="alasan">Alasan Izin</label>
            <textarea id="alasan" name="alasan" placeholder="Tuliskan alasan izin secara singkat dan jelas..." required></textarea>
          </div>

          <div>
            <label for="mulai">Mulai Izin</label>
            <input type="datetime-local" id="mulai" name="mulai" required />
          </div>
          <div>
            <label for="selesai">Selesai Izin</label>
            <input type="datetime-local" id="selesai" name="selesai" required />
          </div>

          <div class="full">
            <label for="kontak">Kontak Aktif</label>
            <input type="tel" id="kontak" name="kontak" placeholder="08xxxxxxxxxx" required />
          </div>

          <div class="full">
            <label for="keterangan">Keterangan Tambahan</label>
            <textarea id="keterangan" name="keterangan" placeholder="Opsional"></textarea>
          </div>
        </div>

        <div class="actions">
          <button type="submit">Kirim Pengajuan</button>
          <button type="reset" class="secondary">Reset Form</button>
        </div>

        <p class="note">Ganti `YOUR_FORMSPREE_ID` dengan endpoint asli dari Formspree sebelum dipasang di GitHub Pages. [web:38][web:41]</p>
      </form>
    </div>
  </div>
</body>
</html>
